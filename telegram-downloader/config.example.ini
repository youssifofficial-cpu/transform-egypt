[telegram]
# ---------------------------------------------------------------------------
# 1) Get api_id and api_hash from  https://my.telegram.org
#    -> log in -> "API development tools" -> create an app.
#    Paste the two values below.
# ---------------------------------------------------------------------------
api_id =
api_hash =

# ---------------------------------------------------------------------------
# 2) Which channel to download from.
#    EASIEST: leave this blank. The tool will show a numbered list of all
#    your channels/groups so you can just pick the one you want.
#    (You can also put a channel @username or numeric id here.)
# ---------------------------------------------------------------------------
channel =

# ---------------------------------------------------------------------------
# 3) Folder where videos are saved. Created automatically if missing.
# ---------------------------------------------------------------------------
download_dir = downloads

# ---------------------------------------------------------------------------
# Optional: only download messages within an id range.
# Leave both at 0 to download ALL videos in the channel.
# ---------------------------------------------------------------------------
min_id = 0
max_id = 0
